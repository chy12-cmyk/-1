<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>분리수거 도우미</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    
    <h1>♻️ 분리수거 도우미</h1>

    <p>
        헷갈리는 분리수거 품목을 쉽고 빠르게 확인하세요!
    </p>
    
    <input type="text" id="searchInput" placeholder="품목 검색">

    <button onclick="searchItem()">검색</button>
  
    <p>지역 선택</p>
    <select>
        <option>대전</option>
        <option>서울</option>
        <option>부산</option>
    </select>

   <div class="section">
    <label>카테고리 선택</label>

    <select id="category" onchange="updateItems()">
        <option value="종이류">📦 종이류</option>
        <option value="플라스틱">🥤 플라스틱</option>
        <option value="유리류">🍾 유리류</option>
        <option value="음식물/일반쓰레기">🍎 음식물/일반쓰레기</option>
        <option value="비닐류">🛍️ 비닐류</option>
        <option value="캔류">🥫 캔류</option>
        <option value="전자제품·기타">🔋 전자제품·기타</option>
    </select>
</div>

<div class="section">
    <label>품목 선택</label>

   <select id="item" onchange="updateStates()">
    <option>피자박스</option>
</select>
</div>

<div class="section">
    <label>상태 선택</label>

    <select id="state">
        <option>상태 선택</option>
    </select>
</div>

<div class="section">
    <button onclick="showResult()">결과 확인</button>
</div>

<div id="result"></div>

<div id="searchResult"></div>

<div class="section">
    <a href="https://www.recycling-info.or.kr"
       target="_blank">
       📌 공식 분리배출 정보 더 알아보기
    </a>
</div>
    
<script src="script.js"></script>

</div>

</body>
</html>
