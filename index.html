<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>분리수거 도우미</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>♻️ 분리수거 도우미</h1>

    <p>지역 선택</p>
    <select>
        <option>대전</option>
        <option>서울</option>
        <option>부산</option>
    </select>

   <div class="section">
    <label>카테고리 선택</label>

    <select id="category" onchange="updateItems()">
        <option value="종이류">📦 종이류</option>
        <option value="플라스틱">🥤 플라스틱</option>
        <option value="유리류">🍾 유리류</option>
        <option value="음식물/일반쓰레기">🍎 음식물/일반쓰레기</option>
    </select>
</div>

<div class="section">
    <label>품목 선택</label>

    <select id="item">
        <option>피자박스</option>
    </select>
</div>

<div class="section">
    <label>상태 선택</label>

    <select id="state">
        <option>상태 선택</option>
    </select>
</div>
    
<script src="script.js"></script>
</body>
</html>
